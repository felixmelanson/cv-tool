<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cv-tool</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --surface: rgba(12,12,14,0.98);
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --text: rgba(255,255,255,0.82);
  --dim: rgba(255,255,255,0.3);
  --dimmer: rgba(255,255,255,0.14);
  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --accent: #38bdf8;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 80px;
}

body.light {
  --bg: #f0f0f2;
  --surface: rgba(248,248,250,0.98);
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: rgba(0,0,0,0.8);
  --dim: rgba(0,0,0,0.35);
  --dimmer: rgba(0,0,0,0.16);
}

/* header */
.hdr {
  position: sticky;
  top: 16px;
  z-index: 999;
  display: flex;
  justify-content: center;
  margin-bottom: -52px;
  pointer-events: none;
}

.hdr-pill {
  pointer-events: all;
  display: flex;
  align-items: center;
  gap: 14px;
  height: 52px;
  padding: 0 22px;
  border-radius: 16px;
  background: rgba(255,255,255,0.015);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.16),
    0 16px 48px rgba(0,0,0,0.88),
    0 0 0 1px rgba(0,0,0,0.3);
}

body.light .hdr-pill {
  background: rgba(255,255,255,0.7);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1), 0 8px 32px rgba(0,0,0,0.12);
}

.hdr-name {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text);
}

.hdr-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--dimmer); }

.hdr-sub {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dimmer);
  font-family: var(--mono);
}

.hdr-btns { display: flex; gap: 10px; margin-left: 8px; }

.hdr-btn {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim);
  transition: color 0.15s, background 0.15s;
}

.hdr-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

/* main */
.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 84px 24px 0;
}

/* tiles */
.tiles {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.tile {
  aspect-ratio: 1;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: linear-gradient(160deg, #111114 0%, #070709 100%);
  box-shadow: 0 16px 36px -10px rgba(0,0,0,0.75), inset 0 0 0 1px rgba(255,255,255,0.045);
  transition: opacity 0.25s, filter 0.25s, transform 0.25s, box-shadow 0.25s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body.light .tile {
  background: linear-gradient(160deg, #e8e8ec 0%, #d8d8de 100%);
  box-shadow: 0 8px 24px -6px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.6);
}

.tile:active { transform: scale(0.96) !important; }

.tile.dim {
  opacity: 0.28;
  filter: grayscale(0.6);
  transform: scale(0.96);
  pointer-events: none;
}

.tile.on {
  box-shadow: 0 20px 40px -10px rgba(0,0,0,0.9), inset 0 0 0 1.5px var(--tc, rgba(255,255,255,0.3));
}

/* sweep */
.sweep {
  position: absolute;
  inset: -140%;
  pointer-events: none;
  opacity: 0.38;
  mix-blend-mode: screen;
}

body.light .sweep { mix-blend-mode: multiply; opacity: 0.15; }

.sweep-inner {
  width: 100%; height: 100%;
  filter: blur(18px);
}

.tile.on .sweep { opacity: 0.7; }

/* tile highlights */
.t-hl {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  width: 85%; pointer-events: none;
  mix-blend-mode: plus-lighter;
  z-index: 1;
}
.t-hl.top { top: 5px; height: 46%; border-radius: 12px 12px 0 0; background: linear-gradient(to bottom, rgba(255,255,255,0.28), transparent); opacity: 0.18; }
.t-hl.bot { bottom: 6px; height: 38%; border-radius: 0 0 12px 12px; background: linear-gradient(to top, rgba(255,255,255,0.22), transparent); opacity: 0.15; }

/* tile content */
.t-inner {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; padding: 14px 10px;
}

.t-icon {
  width: 28px; height: 28px;
  color: rgba(255,255,255,0.28);
  transition: color 0.25s;
  flex-shrink: 0;
}

body.light .t-icon { color: rgba(0,0,0,0.3); }
.tile.on .t-icon { color: var(--tc, rgba(255,255,255,0.9)); }

.t-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  text-align: center;
  line-height: 1.3;
  transition: color 0.25s;
}

body.light .t-label { color: rgba(0,0,0,0.4); }
.tile.on .t-label { color: rgba(255,255,255,0.88); }

.t-sub {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.16);
  text-align: center;
  font-family: var(--mono);
  transition: color 0.25s;
}

body.light .t-sub { color: rgba(0,0,0,0.22); }
.tile.on .t-sub { color: rgba(255,255,255,0.35); }

/* panel */
.panel-wrap { animation: panelIn 0.32s cubic-bezier(0.4,0,0.2,1); }

@keyframes panelIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.992); }
  to   { opacity: 1; transform: none; }
}

.panel {
  background: var(--surface);
  border-radius: 22px;
  border: 1px solid var(--border);
  box-shadow: 0 32px 72px -16px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
  overflow: hidden;
  min-height: 480px;
}

body.light .panel {
  box-shadow: 0 8px 40px -8px rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.9);
}

.ph {
  padding: 20px 24px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}

.ph-icon {
  width: 32px; height: 32px; border-radius: 9px;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--dim);
}

.ph-title {
  font-size: 15px; font-weight: 900;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text);
}

.pb { padding: 22px 24px; }

/* glass toggle — exact from source */
.gtog {
  position: relative; display: flex; align-items: center;
  flex-shrink: 0; height: 38px; padding: 5px; border-radius: 99em;
  background-color: rgba(187,187,188,0.12);
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.03),
    inset 1.8px 3px 0px -2px rgba(255,255,255,0.27),
    inset -2px -2px 0px -2px rgba(255,255,255,0.24),
    inset -3px -8px 1px -6px rgba(255,255,255,0.18),
    inset -0.3px -1px 4px 0px rgba(0,0,0,0.24),
    inset 0px 3px 4px -2px rgba(0,0,0,0.40),
    0px 6px 16px 0px rgba(0,0,0,0.16);
}

.gtog-pill {
  position: absolute; left: 5px; top: 5px;
  height: calc(100% - 10px); border-radius: 99em;
  background-color: rgba(187,187,188,0.38);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.03),
    inset 2px 1px 0px -1px rgba(255,255,255,0.27),
    inset -1.5px -1px 0px -1px rgba(255,255,255,0.24),
    inset -1px 2px 3px -1px rgba(0,0,0,0.40),
    0px 3px 6px 0px rgba(0,0,0,0.16);
  z-index: 0; pointer-events: none;
  transition: transform 380ms cubic-bezier(1,0,0.4,1), width 380ms cubic-bezier(1,0,0.4,1);
}

.gtog-btn {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  height: 100%; border-radius: 99em; border: none;
  background: transparent; cursor: pointer;
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; font-family: var(--font);
  color: rgba(255,255,255,0.3); white-space: nowrap; padding: 0 11px;
  transition: color 140ms ease;
}

.gtog-btn.on { color: rgba(255,255,255,0.9); cursor: default; }
.gtog-btn:not(.on):hover { color: rgba(255,255,255,0.55); }

/* shared */
.slabel {
  font-size: 8px; font-weight: 900; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--dimmer); margin-bottom: 8px;
}

.sdivider { height: 1px; background: var(--border); margin: 16px 0; }

.chartbox {
  background: rgba(0,0,0,0.22); border-radius: 12px;
  border: 1px solid var(--border); padding: 14px;
}

body.light .chartbox { background: rgba(0,0,0,0.04); }

.badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 6px;
  font-size: 9px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase;
}
.bg  { background: rgba(74,222,128,0.1);  color: #4ade80; border: 1px solid rgba(74,222,128,0.22); }
.br  { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.22); }
.by  { background: rgba(251,191,36,0.1);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.22); }
.bb  { background: rgba(56,189,248,0.1);  color: #38bdf8; border: 1px solid rgba(56,189,248,0.22); }

.ds-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--border); background: rgba(255,255,255,0.025);
  font-size: 9px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--dimmer); transition: all 0.15s; user-select: none;
}
.ds-chip.on { color: var(--text); background: rgba(255,255,255,0.065); border-color: var(--border2); }

.stat-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 8px; background: rgba(255,255,255,0.02);
  margin-bottom: 4px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.14s;
}
.stat-row:hover { background: rgba(255,255,255,0.04); }
.stat-row.on { background: rgba(255,255,255,0.06); border-color: var(--border2); }
.stat-row span { font-size: 10px; font-weight: 700; color: var(--dim); }
.stat-row.on span { color: var(--text); }

.rtbl { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 10px; }
.rtbl th { padding: 7px 10px; text-align: left; font-size: 8px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dimmer); border-bottom: 1px solid var(--border); }
.rtbl td { padding: 8px 10px; color: var(--dim); border-bottom: 1px solid rgba(255,255,255,0.025); }

.upload-zone {
  border: 1.5px dashed rgba(255,255,255,0.1); border-radius: 14px;
  padding: 40px 28px; text-align: center; cursor: pointer;
  background: rgba(255,255,255,0.01); transition: all 0.18s;
}
body.light .upload-zone { border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.02); }
.upload-zone:hover, .upload-zone.drag { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.02); }
body.light .upload-zone:hover { border-color: rgba(0,0,0,0.2); background: rgba(0,0,0,0.04); }

.result-box {
  background: rgba(0,0,0,0.32); border: 1px solid var(--border2);
  border-radius: 12px; padding: 16px; font-family: var(--mono);
}
body.light .result-box { background: rgba(0,0,0,0.04); }

.rval { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
.rlbl { font-size: 8px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dimmer); margin-bottom: 7px; }

/* sweep animation */
@keyframes sweepRot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* scrollbar */
::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-pill">
    <div class="hdr-name">cv-tool</div>
    <div class="hdr-sep"></div>
    <div class="hdr-sub" id="hdr-status">no data loaded</div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="theme-btn" title="toggle theme" onclick="toggleTheme()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="tiles" id="tiles"></div>
  <div id="panel"></div>
</div>

<script>
// ─── config ───────────────────────────────────────────

const TILE_COLORS = [
  { hex: '#38bdf8', rgb: '56,189,248'  },
  { hex: '#4ade80', rgb: '74,222,128'  },
  { hex: '#f87171', rgb: '248,113,113' },
  { hex: '#c084fc', rgb: '192,132,252' },
  { hex: '#fbbf24', rgb: '251,191,36'  },
  { hex: '#e2e8f0', rgb: '226,232,240' },
]

const TILES_CFG = [
  { id: 'upload',  label: 'Upload',    sub: 'XML / CSV',      icon: icUpload  },
  { id: 'graph',   label: 'Graph',     sub: 'Time Series',    icon: icChart   },
  { id: 'compare', label: 'Compare',   sub: 'Multi-Dataset',  icon: icCompare },
  { id: 'stats',   label: 'Stats',     sub: 'Test Sandbox',   icon: icSigma   },
  { id: 'metrics', label: 'Metrics',   sub: 'Derived Params', icon: icPulse   },
  { id: 'about',   label: 'About',     sub: '—',              icon: icInfo    },
]

// ─── icons ─────────────────────────────────────────────

function icUpload()  { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>` }
function icChart()   { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>` }
function icCompare() { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18"/><rect x="14" y="3" width="7" height="18"/></svg>` }
function icSigma()   { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 7V4H6l6 8-6 8h12v-3"/></svg>` }
function icPulse()   { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>` }
function icInfo()    { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>` }

// ─── state ─────────────────────────────────────────────

let active = null
let datasets = []
let charts = {}
let theme = 'dark'

// graph state
let gMetric   = 'hr'
let gSmooth   = true
let gPhases   = true
let gActiveDS = []

// stats state
let sMetric = 0
let sTest   = 0
let sDs     = []

// compare state
let cMetric = 0

// ─── Apple Watch metrics we care about ─────────────────

const METRICS = {
  hr:        { label: 'Heart Rate',           unit: 'bpm',     hk: 'HKQuantityTypeIdentifierHeartRate' },
  hrv:       { label: 'HRV (SDNN)',           unit: 'ms',      hk: 'HKQuantityTypeIdentifierHeartRateVariabilitySDNN' },
  spo2:      { label: 'SpO₂',                unit: '%',       hk: 'HKQuantityTypeIdentifierOxygenSaturation' },
  rr:        { label: 'Respiratory Rate',     unit: 'br/min',  hk: 'HKQuantityTypeIdentifierRespiratoryRate' },
  energy:    { label: 'Active Energy',        unit: 'kcal',    hk: 'HKQuantityTypeIdentifierActiveEnergyBurned' },
  vo2:       { label: 'VO₂ Max',             unit: 'mL/kg/min',hk:'HKQuantityTypeIdentifierVO2Max' },
  steps:     { label: 'Step Count',          unit: 'steps',   hk: 'HKQuantityTypeIdentifierStepCount' },
}

// ─── demo data ─────────────────────────────────────────

function rng(s) {
  let seed = s
  return () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff }
}

function makeDemo(id, seed, label) {
  const r = rng(seed)
  const rest = 58 + r() * 14
  const peak = 158 + r() * 22
  const dur = 2400 // 40 min total
  const pts_hr = []

  for (let t = 0; t < dur; t += 8 + Math.floor(r() * 6)) {
    let hr
    const f = t / dur
    if (f < 0.08) {
      hr = rest + (r() - 0.5) * 5
    } else if (f < 0.2) {
      const ramp = (f - 0.08) / 0.12
      hr = rest + (peak * 0.7 - rest) * ramp + (r() - 0.5) * 8
    } else if (f < 0.55) {
      hr = peak * (0.78 + r() * 0.14) + Math.sin(t * 0.02) * 6 + (r() - 0.5) * 10
    } else if (f < 0.62) {
      const warm = (f - 0.55) / 0.07
      hr = peak * 0.92 - (peak * 0.92 - peak * 0.68) * warm + (r() - 0.5) * 6
    } else if (f < 0.72) {
      hr = peak * (0.84 + r() * 0.1) + (r() - 0.5) * 9
    } else {
      const tau = 52 + r() * 28
      const elapsed = (f - 0.72) * dur
      hr = rest + (peak * 0.88 - rest) * Math.exp(-elapsed / tau) + (r() - 0.5) * 5
    }
    pts_hr.push({ t, v: Math.round(Math.max(40, Math.min(210, hr)) * 10) / 10 })
  }

  // fake HRV
  const pts_hrv = pts_hr.filter((_, i) => i % 5 === 0).map(p => ({
    t: p.t,
    v: Math.round((80 - (p.v - rest) * 0.6 + (r() - 0.5) * 12) * 10) / 10
  }))

  // fake SpO2
  const pts_spo2 = pts_hr.filter((_, i) => i % 8 === 0).map(p => ({
    t: p.t,
    v: Math.round((98.5 - (p.v > 160 ? 1.2 : 0) + (r() - 0.5) * 0.8) * 10) / 10
  }))

  // fake energy (cumulative)
  let cum = 0
  const pts_e = pts_hr.filter((_, i) => i % 3 === 0).map(p => {
    cum += (p.v / 180) * 0.12 + r() * 0.06
    return { t: p.t, v: Math.round(cum * 10) / 10 }
  })

  return {
    id, label, color: ['#38bdf8','#4ade80','#f87171','#c084fc'][id % 4],
    rest: Math.round(rest), peak: Math.round(peak),
    totalDur: dur,
    metrics: { hr: pts_hr, hrv: pts_hrv, spo2: pts_spo2, energy: pts_e }
  }
}

// ─── XML parser ────────────────────────────────────────

function parseXML(xmlStr, label) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml')
  const result = { id: datasets.length, label, color: TILE_COLORS[datasets.length % 4].hex, metrics: {} }

  Object.entries(METRICS).forEach(([key, cfg]) => {
    const recs = doc.querySelectorAll(`Record[type="${cfg.hk}"]`)
    if (!recs.length) return
    const pts = []
    const base = new Date(recs[0].getAttribute('startDate')).getTime()
    recs.forEach(r => {
      const t = (new Date(r.getAttribute('startDate')).getTime() - base) / 1000
      let v = parseFloat(r.getAttribute('value'))
      if (key === 'spo2') v *= 100
      if (!isNaN(v) && v > 0) pts.push({ t: Math.round(t), v })
    })
    if (pts.length) result.metrics[key] = pts
  })

  if (!result.metrics.hr) return null
  result.totalDur = result.metrics.hr[result.metrics.hr.length - 1].t
  const restPts = result.metrics.hr.slice(0, Math.floor(result.metrics.hr.length * 0.08))
  result.rest = Math.round(restPts.reduce((s, p) => s + p.v, 0) / restPts.length)
  result.peak = Math.round(Math.max(...result.metrics.hr.map(p => p.v)))
  return result
}

// ─── stats ─────────────────────────────────────────────

function wilcoxon(x, y) {
  const d = x.map((xi, i) => xi - y[i]).filter(d => Math.abs(d) > 1e-9)
  const n = d.length
  if (n < 2) return null
  const items = d.map(v => ({ v, abs: Math.abs(v), sgn: Math.sign(v), rank: 0 })).sort((a,b) => a.abs - b.abs)
  let i = 0
  while (i < n) {
    let j = i
    while (j < n && items[j].abs === items[i].abs) j++
    const avg = (i + j + 1) / 2
    for (let k = i; k < j; k++) items[k].rank = avg
    i = j
  }
  const Wp = items.filter(r => r.sgn > 0).reduce((s,r) => s + r.rank, 0)
  const Wm = items.filter(r => r.sgn < 0).reduce((s,r) => s + r.rank, 0)
  const W = Math.min(Wp, Wm)
  const p = n <= 20 ? exactWilcoxP(W, n) : normalApproxP(W, n)
  const mu = n*(n+1)/4, sig = Math.sqrt(n*(n+1)*(2*n+1)/24)
  const Z = (W - mu) / sig
  return { W, Wp, Wm, n, p, Z, r: Math.abs(Z) / Math.sqrt(n) }
}

function exactWilcoxP(W, n) {
  const tot = 1 << n
  let c = 0
  for (let mask = 0; mask < tot; mask++) {
    let t = 0
    for (let i = 0; i < n; i++) if ((mask >> i) & 1) t += (i + 1)
    if (Math.min(t, n*(n+1)/2 - t) <= W) c++
  }
  return c / tot
}

function normalApproxP(W, n) {
  const mu = n*(n+1)/4, sig = Math.sqrt(n*(n+1)*(2*n+1)/24)
  const z = Math.abs((W - mu) / sig)
  return 2 * (1 - normalCDF(z))
}

function normalCDF(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z))
  const d = 0.3989423 * Math.exp(-z*z/2)
  const p = d * t * (0.3193815 + t*(-0.3565638 + t*(1.7814779 + t*(-1.8212560 + t*1.3302744))))
  return z > 0 ? 1 - p : p
}

function mannWhitney(x, y) {
  const nx = x.length, ny = y.length
  let U1 = 0
  x.forEach(xi => y.forEach(yj => { if (xi > yj) U1++; else if (xi === yj) U1 += 0.5 }))
  const U2 = nx * ny - U1
  const U = Math.min(U1, U2)
  const mu = nx * ny / 2
  const sig = Math.sqrt(nx * ny * (nx + ny + 1) / 12)
  const Z = (U - mu) / sig
  const p = 2 * (1 - normalCDF(Math.abs(Z)))
  const r = Math.abs(Z) / Math.sqrt(nx + ny)
  return { U, U1, U2, nx, ny, Z, p, r }
}

function signTest(x, y) {
  const n = x.length
  const k = x.filter((xi, i) => xi > y[i]).length
  let p = 0
  const lo = Math.min(k, n - k)
  for (let i = 0; i <= lo; i++) p += binom(n, i) * Math.pow(0.5, n)
  return { k, n, p: Math.min(1, p * 2) }
}

function pairedT(x, y) {
  const n = x.length
  const d = x.map((xi, i) => xi - y[i])
  const mean = d.reduce((a,b) => a+b, 0) / n
  const v = d.reduce((s, di) => s + (di - mean)**2, 0) / (n - 1)
  const se = Math.sqrt(v / n)
  const t = mean / se
  const p = 2 * (1 - tCDF(Math.abs(t), n - 1))
  const cohd = mean / Math.sqrt(v)
  return { t, p, d: cohd, mean, se, n }
}

function tCDF(t, df) {
  const x = df / (df + t*t)
  return 1 - 0.5 * betaInc(df/2, 0.5, x)
}

function betaInc(a, b, x) {
  // continued fraction approx
  if (x < 0 || x > 1) return 0
  if (x === 0) return 0
  if (x === 1) return 1
  const lbeta = logGamma(a + b) - logGamma(a) - logGamma(b)
  const front = Math.exp(Math.log(x)*a + Math.log(1-x)*b - lbeta) / a
  let c = 1, d = 1 - (a+b)*x/(a+1), sum = 1
  d = d === 0 ? 1e-30 : 1/d; c = d
  for (let m = 1; m <= 100; m++) {
    const m2 = 2*m
    let num = m*(b-m)*x / ((a+m2-1)*(a+m2))
    d = 1 + num*d; d = d === 0 ? 1e-30 : d
    c = 1 + num/c; c = c === 0 ? 1e-30 : c
    d = 1/d; let delta = c*d
    sum *= delta
    num = -(a+m)*(a+b+m)*x / ((a+m2)*(a+m2+1))
    d = 1 + num*d; d = d === 0 ? 1e-30 : d
    c = 1 + num/c; c = c === 0 ? 1e-30 : c
    d = 1/d; delta = c*d; sum *= delta
    if (Math.abs(delta - 1) < 1e-8) break
  }
  return front * sum
}

function logGamma(z) {
  const c = [76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5]
  let x = z, y = z, tmp = x + 5.5
  tmp -= (x + 0.5) * Math.log(tmp)
  let ser = 1.000000000190015
  for (let i = 0; i < 6; i++) ser += c[i] / ++y
  return -tmp + Math.log(2.5066282746310005 * ser / x)
}

function pearson(x, y) {
  const n = x.length
  const mx = x.reduce((a,b)=>a+b,0)/n, my = y.reduce((a,b)=>a+b,0)/n
  const num = x.reduce((s,xi,i)=>s+(xi-mx)*(y[i]-my),0)
  const dx = Math.sqrt(x.reduce((s,xi)=>s+(xi-mx)**2,0))
  const dy = Math.sqrt(y.reduce((s,yi)=>s+(yi-my)**2,0))
  const r = num / (dx * dy)
  const t = r * Math.sqrt(n-2) / Math.sqrt(1-r*r)
  const p = 2 * (1 - tCDF(Math.abs(t), n-2))
  return { r, t, p, n }
}

function spearman(x, y) {
  const rank = arr => {
    const sorted = [...arr].map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v)
    const ranks = new Array(arr.length)
    let i = 0
    while (i < sorted.length) {
      let j = i
      while (j < sorted.length && sorted[j].v === sorted[i].v) j++
      const avg = (i + j + 1) / 2
      for (let k = i; k < j; k++) ranks[sorted[k].i] = avg
      i = j
    }
    return ranks
  }
  const rx = rank(x), ry = rank(y)
  return pearson(rx, ry)
}

function bootstrap95CI(x, y, fn, n = 2000) {
  const diffs = []
  for (let i = 0; i < n; i++) {
    const bx = [], by = []
    for (let j = 0; j < x.length; j++) {
      const idx = Math.floor(Math.random() * x.length)
      bx.push(x[idx]); by.push(y[idx])
    }
    const mx = bx.reduce((a,b)=>a+b,0)/bx.length
    const my = by.reduce((a,b)=>a+b,0)/by.length
    diffs.push(mx - my)
  }
  diffs.sort((a,b)=>a-b)
  return { lo: diffs[Math.floor(n*0.025)], hi: diffs[Math.floor(n*0.975)] }
}

function binom(n, k) {
  if (k < 0 || k > n) return 0
  if (k === 0 || k === n) return 1
  let r = 1
  for (let i = 0; i < Math.min(k, n-k); i++) r = r*(n-i)/(i+1)
  return r
}

function pFmt(p) {
  if (p < 0.001) return '< 0.001'
  return p.toFixed(4)
}

// ─── glass toggle factory ──────────────────────────────

function makeToggle(id, labels, activeIdx, onChange) {
  const bw = 54 + Math.max(...labels.map(l=>l.length)) * 4
  const pw = bw - 2
  const tw = bw * labels.length + 10
  return `
    <div class="gtog" id="gt-${id}" style="width:${tw}px">
      <div class="gtog-pill" id="gtp-${id}" style="width:${pw}px; transform:translateX(${activeIdx*(pw+1)}px)"></div>
      ${labels.map((l,i)=>`
        <button class="gtog-btn ${i===activeIdx?'on':''}" style="width:${bw}px"
          onclick="gtClick('${id}',${i},'${onChange}')">${l}</button>
      `).join('')}
    </div>`
}

function gtClick(id, idx, cb) {
  const wrap = document.getElementById(`gt-${id}`)
  const pill = document.getElementById(`gtp-${id}`)
  if (!wrap || !pill) return
  const pw = pill.offsetWidth
  wrap.querySelectorAll('.gtog-btn').forEach((b,i) => b.classList.toggle('on', i===idx))
  pill.style.transform = `translateX(${idx*(pw+1)}px)`
  if (window[cb]) window[cb](idx)
}

    document.getElementById('panel').innerHTML = ''

  active = id
  renderTiles()
  const html = ({ upload: uploadPanel, graph: graphPanel, compare: comparePanel, stats: statsPanel, metrics: metricsPanel, about: aboutPanel })[id]?.()

}

function initUpload() {

function parseFile(file) {
  const r = new FileReader()
  r.onload = e => {
    if (file.name.endsWith('.xml')) {
      const label = file.name.replace('export.xml','').replace('.xml','') || `Dataset ${datasets.length+1}`
      const ds = parseXML(e.target.result, label || `DS${datasets.length+1}`)
      if (!ds) { alert('No HR records found in this export.'); return }
      ds.color = TILE_COLORS[datasets.length % TILE_COLORS.length].hex
      datasets.push(ds)
    } else {
      alert('CSV import coming soon.')
      return
    }
    refreshDsList()
    updateHdrStatus()
    gActiveDS = datasets.map(d=>d.id)
    sDs = [...gActiveDS]
  }
  r.readAsText(file)
}

    b.style.borderColor = bk===k?'var(--border2)':'var(--border)'
    b.style.color = bk===k?'var(--text)':'var(--dimmer)'
  })
  killCharts(); buildGraph(); buildStatStrip()
}
window.toggleGDS = id => {
  if (gActiveDS.includes(id)) gActiveDS = gActiveDS.filter(x=>x!==id)
  else gActiveDS.push(id)
  document.getElementById(`gc-${id}`)?.classList.toggle('on', gActiveDS.includes(id))
  killCharts(); buildGraph()
}

function buildGraph() {

function buildStatStrip() {
  const el = document.getElementById('g-stat-strip')
  if (!el) return
  const m = METRICS[gMetric]
  const active = datasets.filter(d => gActiveDS.includes(d.id) && d.metrics[gMetric])
  el.innerHTML = active.map(ds => {
    const pts = ds.metrics[gMetric]
    const vals = pts.map(p=>p.v)
    const mean = vals.reduce((a,b)=>a+b,0)/vals.length
    const max = Math.max(...vals), min = Math.min(...vals)
    const sd = Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length)
    return `
      <div class="chartbox">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <div style="width:5px;height:5px;border-radius:50%;background:${ds.color}"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-family:var(--mono);font-size:9px">
          <div style="color:var(--dimmer)">mean</div><div style="color:var(--text)">${mean.toFixed(1)}</div>
          <div style="color:var(--dimmer)">max</div><div style="color:var(--text)">${max.toFixed(1)}</div>
          <div style="color:var(--dimmer)">min</div><div style="color:var(--text)">${min.toFixed(1)}</div>
          <div style="color:var(--dimmer)">sd</div><div style="color:var(--text)">${sd.toFixed(1)}</div>
        </div>
      </div>`
  }).join('')
}

function exportGraphPNG() {
  const canvas = document.getElementById('g-canvas')
  if (!canvas) return
  const link = document.createElement('a')
  link.download = `cv-tool-${gMetric}-${Date.now()}.png`
  link.href = canvas.toDataURL('image/png')
  link.click()
}

function exportGraphVideo() {
  const canvas = document.getElementById('g-canvas')
  const btn = document.getElementById('vid-btn')
  if (!canvas || !charts.g) return

  const stream = canvas.captureStream(30)
  const rec = new MediaRecorder(stream, { mimeType: 'video/webm' })
  const chunks = []
  rec.ondataavailable = e => chunks.push(e.data)
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.download = `cv-tool-${gMetric}-${Date.now()}.webm`
    a.href = url; a.click()
    URL.revokeObjectURL(url)
    btn.textContent = 'Record Video'
  }

  // animate zoom reset
  charts.g.resetZoom()
  rec.start()
  btn.textContent = '⏹ Stop'
  btn.onclick = () => rec.stop()
}

      },

}

// STATS
// ═══════════════════════════════════════════

const STAT_METRICS = [
  { label:'HR mean',        get: ds => { const v=ds.metrics.hr?.map(p=>p.v)||[]; return v.reduce((a,b)=>a+b,0)/v.length } },
  { label:'HR peak',        get: ds => Math.max(...(ds.metrics.hr?.map(p=>p.v)||[0])) },
  { label:'HR final 10%',   get: ds => { const v=(ds.metrics.hr||[]).slice(-Math.ceil((ds.metrics.hr||[]).length*0.1)).map(p=>p.v); return v.reduce((a,b)=>a+b,0)/v.length } },
  { label:'HRV mean',       get: ds => { const v=ds.metrics.hrv?.map(p=>p.v)||[]; return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null } },
  { label:'SpO₂ mean',     get: ds => { const v=ds.metrics.spo2?.map(p=>p.v)||[]; return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null } },
  { label:'HR × SpO₂ covariance', get: null }, // special case
]

const STAT_TESTS = [
  { label: 'Wilcoxon Signed-Rank', paired: true },
  { label: 'Sign Test',            paired: true },
  { label: 'Paired t-Test',        paired: true },
  { label: 'Mann–Whitney U',       paired: false },
  { label: 'Pearson Correlation',  paired: false, corr: true },
  { label: 'Spearman Correlation', paired: false, corr: true },
]

function statsPanel() {
  if (datasets.length < 2) return noDataMsg(icSigma, 'Load 2+ datasets to run statistics')

  const dsChips = datasets.map(ds=>`
    <div class="ds-chip ${sDs.includes(ds.id)?'on':''}" id="sc-${ds.id}" onclick="toggleSDS(${ds.id})">
      <div style="width:5px;height:5px;border-radius:50%;background:${ds.color}"></div>${ds.label}
    </div>`).join('')

  const mRows = STAT_METRICS.map((m,i)=>`
    <div class="stat-row ${sMetric===i?'on':''}" id="sm-${i}" onclick="setSM(${i})">
      <input type="radio" name="smet" ${sMetric===i?'checked':''} style="accent-color:var(--text);flex-shrink:0">
      <span>${m.label}</span>
    </div>`).join('')

  const tRows = STAT_TESTS.map((t,i)=>`
    <div class="stat-row ${sTest===i?'on':''}" id="st-${i}" onclick="setST(${i})">
      <input type="radio" name="stest" ${sTest===i?'checked':''} style="accent-color:var(--text);flex-shrink:0">
      <span>${t.label}</span>
    </div>`).join('')

  return `
    ${ph(icSigma, 'Stats Sandbox', `<div style="display:flex;gap:6px">${dsChips}</div>`)}
    <div class="pb" style="display:grid;grid-template-columns:220px 1fr;gap:20px;min-height:420px">
      <div>
        <div class="slabel">Metric</div>
        <div id="sm-group">${mRows}</div>
        <div class="sdivider"></div>
        <div class="slabel">Test</div>
        <div id="st-group">${tRows}</div>
      </div>
      <div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px" id="stat-cards"></div>
        <div id="stat-output" class="chartbox" style="font-family:var(--mono);font-size:10px;line-height:2;color:var(--dim);margin-bottom:12px"></div>
        <div id="stat-tbl"></div>
        <div id="stat-interp" style="margin-top:12px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);font-size:11px;color:var(--dim);line-height:1.7;display:none"></div>
      </div>
    </div>`
}

function initStats() { runStats() }

window.toggleSDS = id => {
  if (sDs.includes(id)) sDs = sDs.filter(x=>x!==id)
  else sDs.push(id)
  document.getElementById(`sc-${id}`)?.classList.toggle('on', sDs.includes(id))
  runStats()
}
window.setSM = i => {
  sMetric = i
  document.querySelectorAll('[id^="sm-"]').forEach((el,j) => el.classList.toggle('on', j===i))
  runStats()
}
window.setST = i => {
  sTest = i
  document.querySelectorAll('[id^="st-"]').forEach((el,j) => el.classList.toggle('on', j===i))
  runStats()
}

function runStats() {
  const cardsEl  = document.getElementById('stat-cards')
  const outEl    = document.getElementById('stat-output')
  const tblEl    = document.getElementById('stat-tbl')
  const interpEl = document.getElementById('stat-interp')
  if (!cardsEl) return

  const active = datasets.filter(d=>sDs.includes(d.id))
  if (active.length < 2) {
    cardsEl.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--dimmer);font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase">Need ≥ 2 datasets selected</div>`
    return
  }

  const m = STAT_METRICS[sMetric]
  const test = STAT_TESTS[sTest]

  // get values
  let vals = active.map(ds => ({ ds, v: m.get ? m.get(ds) : null })).filter(x => x.v !== null)
  if (vals.length < 2) {
    cardsEl.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--dimmer);font-size:10px;font-weight:700">Metric not available for selected datasets</div>`
    return
  }

  const x = vals.map(v=>v.v)
  let result, pVal, effectSize, effectLabel, statStr

  if (test.corr) {
    // correlation between first two datasets' HR series (time-matched)
    const ds1 = active[0], ds2 = active[1]
    const p1 = ds1.metrics.hr||[], p2 = ds2.metrics.hr||[]
    const paired = []
    p1.forEach(a => {
      const b = p2.find(pp => Math.abs(pp.t - a.t) < 15)
      if (b) paired.push([a.v, b.v])
    })
    if (paired.length < 4) {
      cardsEl.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--dimmer);font-size:10px;font-weight:700">Not enough overlapping timepoints</div>`
      return
    }
    const cx = paired.map(p=>p[0]), cy = paired.map(p=>p[1])
    result = sTest === 4 ? pearson(cx,cy) : spearman(cx,cy)
    pVal = result.p; effectSize = result.r.toFixed(3); effectLabel = `r = ${result.r.toFixed(3)}`
    statStr = `${sTest===4?'r':'ρ'}(${result.n-2}) = ${result.r.toFixed(4)}, p = ${pFmt(pVal)}`
  } else if (test.paired) {
    if (vals.length !== 2) {
      cardsEl.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--dimmer);font-size:10px;font-weight:700">Paired tests require exactly 2 datasets</div>`
      return
    }
    // for paired tests we use the metric value as a single observation per dataset
    // and bootstrap from within-dataset samples
    const ds1 = active[0], ds2 = active[1]
    const pts1 = (ds1.metrics.hr||[]).map(p=>p.v), pts2 = (ds2.metrics.hr||[]).map(p=>p.v)
    const minN = Math.min(pts1.length, pts2.length)
    const sub1 = pts1.slice(0, minN), sub2 = pts2.slice(0, minN)

    if (sTest === 0) {
      result = wilcoxon(sub1, sub2)
      if (!result) { cardsEl.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--dimmer);font-size:10px">Insufficient data</div>`; return }
      pVal = result.p; effectSize = result.r.toFixed(3)
      effectLabel = `r = ${result.r.toFixed(3)} (${result.r>0.5?'large':result.r>0.3?'medium':'small'})`
      statStr = `W+ = ${result.Wp.toFixed(1)}, W− = ${result.Wm.toFixed(1)}, W = ${result.W.toFixed(1)}, n = ${result.n}`
    } else if (sTest === 1) {
      result = signTest(sub1, sub2)
      pVal = result.p; effectSize = `${result.k}/${result.n}`
      effectLabel = `${result.k} of ${result.n} positive`
      statStr = `k = ${result.k}, n = ${result.n}`
    } else if (sTest === 2) {
      result = pairedT(sub1, sub2)
      pVal = result.p; effectSize = result.d.toFixed(3)
      effectLabel = `d = ${result.d.toFixed(3)} (${Math.abs(result.d)>0.8?'large':Math.abs(result.d)>0.5?'medium':'small'})`
      statStr = `t(${result.n-1}) = ${result.t.toFixed(3)}, mean Δ = ${result.mean.toFixed(2)}, SE = ${result.se.toFixed(2)}`
    }
  } else {
    // Mann-Whitney unpaired
    if (vals.length !== 2) { cardsEl.innerHTML=`<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--dimmer);font-size:10px;font-weight:700">Select exactly 2 datasets</div>`; return }
    const pts1 = (active[0].metrics.hr||[]).map(p=>p.v)
    const pts2 = (active[1].metrics.hr||[]).map(p=>p.v)
    result = mannWhitney(pts1, pts2)
    pVal = result.p; effectSize = result.r.toFixed(3)
    effectLabel = `r = ${result.r.toFixed(3)} (${result.r>0.5?'large':result.r>0.3?'medium':'small'})`
    statStr = `U = ${result.U.toFixed(1)}, Z = ${result.Z.toFixed(3)}, n₁=${result.nx}, n₂=${result.ny}`
  }

  // 95% CI via bootstrap (only for simple paired/unpaired mean diff)
  let ciStr = ''
  if (!test.corr && vals.length === 2 && !test.corr) {
    const p1 = (active[0].metrics.hr||[]).map(p=>p.v)
    const p2 = (active[1].metrics.hr||[]).map(p=>p.v)
    const mn = Math.min(p1.length, p2.length)
    const ci = bootstrap95CI(p1.slice(0,mn), p2.slice(0,mn), null, 1000)
    ciStr = `95% CI (bootstrap): [${ci.lo.toFixed(2)}, ${ci.hi.toFixed(2)}]`
  }

  const pColor = pVal < 0.05 ? '#4ade80' : pVal < 0.1 ? '#fbbf24' : '#f87171'
  const sigBadge = pVal < 0.05 ? `<span class="badge bg">p < 0.05</span>` : pVal < 0.1 ? `<span class="badge by">Trend</span>` : `<span class="badge br">n.s.</span>`

  const mean1 = active[0] ? vals.find(v=>v.ds.id===active[0].id)?.v : null
  const mean2 = active[1] ? vals.find(v=>v.ds.id===active[1].id)?.v : null

  cardsEl.innerHTML = `
    <div class="result-box">
      <div class="rlbl">p-value (two-tailed)</div>
      <div class="rval" style="color:${pColor}">${pFmt(pVal)}</div>
      <div style="margin-top:9px">${sigBadge}</div>
    </div>
    <div class="result-box">
      <div class="rlbl">Effect size</div>
      <div class="rval">${effectSize}</div>
      <div style="margin-top:9px;font-size:9px;color:var(--dimmer);font-weight:700;letter-spacing:0.1em">${effectLabel}</div>
    </div>
    <div class="result-box">
      <div class="rlbl">Test</div>
      <div style="font-size:13px;font-weight:900;color:var(--text);line-height:1.3;margin-top:4px">${test.label}</div>
    </div>`

  if (outEl) outEl.innerHTML = `
    <span style="color:var(--dimmer)">metric:</span> ${m.label}<br>
    <span style="color:var(--dimmer)">stat:</span>   ${statStr}<br>
    <span style="color:var(--dimmer)">p =</span>     <span style="color:${pColor};font-weight:700">${pFmt(pVal)}</span><br>
    ${ciStr ? `<span style="color:var(--dimmer)">${ciStr}</span><br>` : ''}
    ${active.slice(0,2).map(ds=>{
      const v = vals.find(vv=>vv.ds.id===ds.id)?.v
      return `<span style="color:var(--dimmer)">${ds.label}:</span> ${v?.toFixed(2)||'—'}`
    }).join('<br>')}`

  if (tblEl) tblEl.innerHTML = `
    <table class="rtbl">
      <thead><tr><th>Dataset</th><th>${m.label}</th><th>HR mean</th><th>HR peak</th><th>Rest</th></tr></thead>
      <tbody>${active.map(ds=>{
        const vv = vals.find(v=>v.ds.id===ds.id)?.v
        const hrm = ds.metrics.hr?.reduce((s,p,_,a)=>s+p.v/a.length,0)
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:6px"><div style="width:5px;height:5px;border-radius:50%;background:${ds.color}"></div>${ds.label}</div></td>
          <td style="color:var(--text)">${vv?.toFixed(2)||'—'}</td>
          <td>${hrm?.toFixed(1)||'—'}</td>
          <td>${ds.peak}</td>
          <td>${ds.rest}</td>
        </tr>`
      }).join('')}</tbody>
    </table>`

  if (interpEl) {
    interpEl.style.display = 'block'
    const dir = pVal < 0.05
      ? `Statistically significant difference detected (p = ${pFmt(pVal)}). ${effectLabel}. ${ciStr}`
      : pVal < 0.1
        ? `Trend toward significance (p = ${pFmt(pVal)}). Effect size: ${effectLabel}. Consider increasing n.`
        : `No statistically significant difference (p = ${pFmt(pVal)}). ${effectLabel}. Small sample — underpowered.`
    interpEl.innerHTML = `<strong style="color:var(--text)">Interpretation:</strong> ${dir}`
  }
}

// ═══════════════════════════════════════════
// METRICS (derived params)
// ═══════════════════════════════════════════

function metricsPanel() {
  if (!datasets.length) return noDataMsg(icPulse)

  return `
    ${ph(icPulse, 'Derived Metrics')}
    <div class="pb">
      <div id="met-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px"></div>
    </div>`
}

function initMetrics() {
  const el = document.getElementById('met-cards')
  if (!el) return
  el.innerHTML = datasets.map(ds => {
    const hr = ds.metrics.hr?.map(p=>p.v)||[]
    if (!hr.length) return ''
    const mean = hr.reduce((a,b)=>a+b,0)/hr.length
    const sd = Math.sqrt(hr.reduce((s,v)=>s+(v-mean)**2,0)/hr.length)
    const peak = Math.max(...hr), rest = ds.rest

    // HR recovery rate (drop from peak in first 60s of last 30% of session)
    const recPts = ds.metrics.hr?.slice(-Math.floor(ds.metrics.hr.length*0.3))||[]
    const recStart = recPts[0]?.v||peak
    const rec60 = recPts.find(p => p.t >= (recPts[0]?.t||0) + 60)
    const hrr1 = recStart - (rec60?.v||recStart)

    // RMSSD approx from HR (rough)
    const rmssd = hr.length > 1
      ? Math.sqrt(hr.slice(1).reduce((s,v,i)=>s+(v-hr[i])**2,0)/(hr.length-1))
      : null

    // RPP approx (needs BP — placeholder)
    const vo2 = ds.metrics.vo2?.[0]?.v

    const rows = [
      ['HR mean',     `${mean.toFixed(1)} bpm`],
      ['HR peak',     `${peak} bpm`],
      ['HR SD',       `${sd.toFixed(1)} bpm`],
      ['HR reserve',  `${peak - rest} bpm`],
      ['HRR (1 min)', hrr1 > 0 ? `${hrr1.toFixed(1)} bpm` : '—'],
      ['RMSSD (approx)', rmssd ? `${rmssd.toFixed(1)}` : '—'],
      ['VO₂ Max',    vo2 ? `${vo2.toFixed(1)} mL/kg/min` : '—'],
    ]

    return `
      <div class="chartbox">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:12px">
          <div style="width:8px;height:8px;border-radius:50%;background:${ds.color};box-shadow:0 0 8px ${ds.color}"></div>
          <span style="font-size:11px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:var(--text)">${ds.label}</span>
        </div>
        <table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px">
          ${rows.map(([l,v])=>`
            <tr>
              <td style="padding:5px 0;color:var(--dimmer);width:55%">${l}</td>
              <td style="padding:5px 0;color:var(--text);text-align:right;font-weight:700">${v}</td>
            </tr>`).join('')}
        </table>
      </div>`
  }).join('')
}
